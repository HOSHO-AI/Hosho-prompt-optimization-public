name: 'Hosho Prompt Reviewer'
description: 'Automated prompt engineering reviews — scores quality, identifies gaps, suggests actionable fixes'
author: 'Hosho'

branding:
  icon: 'check-circle'
  color: 'purple'

inputs:
  api_key:
    description: 'Hosho Prompt Reviewer API key'
    required: true
  api_url:
    description: 'API endpoint URL (override for enterprise/self-hosted deployments)'
    required: false
    default: ''
  prompt_file:
    description: 'Path to specific prompt file to review (on-demand mode only)'
    required: false
    default: ''
  file_pattern:
    description: 'Glob pattern(s) for identifying prompt files in PRs. Supports comma-separated patterns (e.g. "**/*system-prompt*.md" or "**/*system-prompt*.md, **/*user-prompt*.md")'
    required: false
    default: ''
  prompt_path:
    description: 'Directory prefix for identifying prompt files in PRs (e.g. "prompts/")'
    required: false
    default: ''
  system_overview:
    description: 'Path to system overview markdown file describing the multi-agent pipeline (optional)'
    required: false
    default: ''
  timeout:
    description: 'API call timeout in seconds'
    required: false
    default: '600'
  custom_principles:
    description: 'Path to markdown file with custom prompt review principles'
    required: false
    default: ''
  skills_dir:
    description: 'Directory (or newline-separated list of directories) containing skill files. When set, backticked tokens in prompts that resolve to `<skills_dir>/<name>/SKILL.md` or `<skills_dir>/<name>.md` are bundled as review context. Optional — leave empty to skip skill bundling.'
    required: false
    default: ''
  bundle_siblings:
    description: 'When "true", bundle sibling `*prompt*.md` and `*addendum*.md` files from the same directory as each reviewed prompt. Catches paired system/user prompts and runtime addendums. Optional, default false.'
    required: false
    default: 'false'
  pr_number:
    description: 'PR number (required when triggered via issue_comment slash command)'
    required: false
    default: ''

outputs:
  overall_score:
    description: 'Overall score label (Excellent/Good/Needs Work/Critical)'
  review_summary:
    description: 'Brief summary of the review findings'

runs:
  using: 'node24'
  main: 'dist/index.js'
